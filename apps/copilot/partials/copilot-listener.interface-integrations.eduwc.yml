billingIds: ${generate-ai-responses[*].response.data.reply}
interface:
  inputs:
    type: object
    properties:
      fromDomains:
        type: array
        items:
          type: string
        description: >
          Optional. Domains to include (OR). Each matches senders whose address contains @domain.
          When empty or omitted, all senders in mailFolderNames are considered.
      excludeDomains:
        type: array
        items:
          type: string
        description: >
          Optional. Domains to drop even when they would otherwise match (e.g. noreply@mail.example.com
          via mail.example.com).
      mailFolderNames:
        type: array
        items:
          type: string
        description: >
          Optional. Folders to scan for inbound mail (OR). Outlook: Graph folder GUID, well-known shortcut
          (inbox, junkemail, …), or exact displayName. Gmail: system folder (inbox, spam, …) or label name.
          When omitted or empty, defaults to inbox only. When set, only the listed folders are scanned.
      maxResults:
        type: integer
        default: 10
        description: Maximum number of emails to retrieve
      windowHours:
        type: number
        default: 720
        description: >
          Rolling lookback window in hours for inbound and sent mail. Default 720 (30 days).
          Use 0 for no time limit (subject to API pagination). Examples: 24 = last day, 168 = last week.
      emailProvider:
        type: string
        enum: [OUTLOOK, GMAIL]
        default: OUTLOOK
        description: Email provider to use
      createDraft:
        type: boolean
        default: true
        description: If true, create drafts only. If false, send replies directly.
      airtable_base_id:
        type: string
        description: Airtable base ID to fetch data from
      airtable_table_id:
        type: string
        description: Airtable table ID to fetch data from
      airtable_filter_field:
        type: string
        default: url
        description: Airtable column for listing URL lookup and cache upsert (default url).
      anzeige_url_regex:
        type: string
        default: "https?://(?:www\\.)?kleinanzeigen\\.de/s-anzeige/[^\\s\"'<>]+"
        description: |
          Regex to extract the listing URL from conversation message bodies (optional capturing group).
          Used by get-listing-data for Airtable lookup and scrape-on-miss cache fill.
      message_regex:
        type: array
        items:
          type: string
        description: |
          List of regex patterns (each with optional capturing group); each is tried in order against the message body and the first match is used to extract message content.
      customInfo:
        type: string
        description: Context/info for the AI reply (passed to generate-response; previously from listener).
      listenerEmail:
        type: string
        description: Optional mailbox address of the listener. Used to identify outgoing messages and as sender for Gmail drafts.
      lang:
        type: string
        default: de
        description: Language for default category value names when type is DISCRETE_THREE or SENTIMENT and values are empty (e.g. en = high/medium/low, de = hoch/mittel/niedrig)
      customCategories:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
              description: Category name
            shortName:
              type: string
              description: Short name for the category (e.g. for "seller intent" for "si")
            description:
              type: string
              description: Category description
            possibleValues:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: Possible value name
                  description:
                    type: string
                    description: |
                      What this value means (especially for type STRINGS). Passed to the AI when classifying the conversation.
                  color:
                    type: string
                    description: Possible value color
            type:
              type: string
              enum: [STRINGS, DISCRETE_THREE, SENTIMENT]
              description: When possibleValues is empty, used to derive Outlook category value names (e.g. DISCRETE_THREE → high, medium, low; SENTIMENT → positive, neutral, negative)
        description: Custom categories to add to the draft
      scheduleAppointments:
        type: boolean
        default: false
        description: |
          If true (OUTLOOK only), reads your calendar via Microsoft Graph, passes free slots to the AI, and can create an event when the model returns scheduling with an allowed slot.
      appointmentDurationMinutes:
        type: integer
        default: 30
        description: Length in minutes for each proposed and bookable time slot.
      maxSchedulingRecommendations:
        type: integer
        default: 3
        description: |
          Maximum number of time options (1–3) listed for the AI and sent as calendarAvailability.slots.
      appointmentHorizonDays:
        type: integer
        default: 14
        description: How many days ahead to scan the calendar for busy times.
      appointmentTimeZone:
        type: string
        default: Europe/Berlin
        description: IANA timezone for working hours and slot boundaries (Graph Prefer header).
      appointmentWorkdayStart:
        type: string
        default: "09:00"
        description: Local start of working day (HH:MM).
      appointmentWorkdayEnd:
        type: string
        default: "18:00"
        description: Local end of working day (HH:MM).
      appointmentMinimumLeadHours:
        type: number
        default: 24
        description: |
          Minimum notice before the start of the first offered slot, measured from “now” in appointmentTimeZone.
          Slots whose start is before now plus this many hours are excluded (still clipped to the workday window).
          Example: 2 avoids offering slots in the next two hours; 24 generally pushes the first options to roughly “this time tomorrow” or later.
      appointmentMaxSlots:
        type: integer
        default: 24
        description: |
          Upper bound while scanning the calendar for gaps (internal). The list passed to the AI is capped by maxSchedulingRecommendations (max 3).
  outputs:
    type: object
    properties: {}
integrations:
  copilot-outlook-oauth:
    provider: microsoft
    scopes:
      - Mail.Read
      - Mail.Read.Shared
      - Mail.ReadWrite
      - Mail.ReadWrite.Shared
      - Calendars.Read
      - Calendars.ReadWrite
  copilot-gmail-oauth:
    provider: google
    scopes:
      - https://www.googleapis.com/auth/gmail.labels
      - https://www.googleapis.com/auth/gmail.modify
      - https://www.googleapis.com/auth/gmail.compose
      - https://www.googleapis.com/auth/gmail.readonly
