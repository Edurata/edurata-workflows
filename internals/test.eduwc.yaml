apiRevision: edurata.io/v1
title: Import workflows and functions
description: For internal use and curious eyes
interface:
  inputs:
    properties:
      sleepTime:
        type: number
    required:
      - sleepTime
  outputs:
    properties:
      totalElapsedSleepTime:
        type: string
outputs:
  totalElapsedSleepTime: $.sleep-31.sleepTime
steps:
  sleep-0:
    source:
      imageRepoUrl: hello-world
      tag: latest
    dependencies:
      sleepTime: $.inputs.sleepTime
  sleep-1:
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: tests/sleep
    dependencies:
      sleepTime: $.inputs.sleepTime
  sleep-2:
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: tests/sleep
    dependencies:
      sleepTime: $.sleep-1.sleepTime
      file: $.sleep-1.file
  sleep-31:
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: tests/sleep
    dependencies:
      sleepTime: $.sleep-2.sleepTime
      file: $.sleep-1.file
  sleep-32:
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: tests/sleep
    dependencies:
      sleepTime: $.sleep-1.sleepTime
      file: $.sleep-2.file
