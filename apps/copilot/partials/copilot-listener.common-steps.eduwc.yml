steps:
  # --------------------------- COMMON ---------------------------
  target-thread-ids:
    description: |
      Vereinheitlicht die zu verarbeitenden Thread-/Conversation-IDs über Provider hinweg.
      Provider-spezifische Quell-Schritte sind optional (?), damit ein übersprungener Gmail/Outlook-Zweig
      das Laden der anderen Provider-Ausgabe nicht blockiert.
    runtime: python3_10
    code: |
      def handler(inputs):
          provider = (inputs.get("emailProvider") or "").strip().upper()
          if provider == "GMAIL":
              return {"ids": inputs.get("gmailIds") or []}
          return {"ids": inputs.get("outlookIds") or []}
    props:
      emailProvider: ${inputs.emailProvider}
      outlookIds: ${get-outlook-unanswered?.unansweredConversationIds}
      gmailIds: ${get-gmail-unanswered?.unansweredThreadIds}

  target-conversations:
    description: |
      Vereinheitlicht die geladenen Konversationen über Provider hinweg.
    foreach: ${target-thread-ids.ids}
    runtime: python3_10
    code: |
      def handler(inputs):
          provider = (inputs.get("emailProvider") or "").strip().upper()
          if provider == "GMAIL":
              return {"messages": inputs.get("gmailMessages") or []}
          return {"messages": inputs.get("outlookMessages") or []}
    props:
      emailProvider: ${inputs.emailProvider}
      outlookMessages: ${get-outlook-conversation[each.index].messages}
      gmailMessages: ${get-gmail-thread-conversation[each.index].messages}

  extract-conversation-info:
    description: |
      Extrahiert provider-agnostisch conversationHistory sowie latestInboundMessageId/latestInboundFromAddress/latestInboundSubject.
    foreach: ${target-thread-ids.ids}
    runtime: python3_10
    code: |
      import re
      from email.utils import getaddresses
      def handler(inputs):
          provider = (inputs.get("emailProvider") or "").strip().upper()
          conversation_messages = inputs.get("conversationMessages") or []
          message_regex_list = inputs.get("message_regex") or []
          if isinstance(message_regex_list, str):
              message_regex_list = [message_regex_list] if message_regex_list else []
          listener_email = (inputs.get("listenerEmail") or "").strip().lower()
          messages = []
          if provider == "OUTLOOK":
              latest_inbound_key = ""
          else:
              latest_inbound_key = 0
          latest_inbound_message_id = ""
          latest_inbound_from_address = ""
          latest_inbound_from_name = ""
          latest_inbound_subject = ""

          for idx, msg in enumerate(conversation_messages):
              body = msg.get("body")
              content = body if isinstance(body, str) else ((body or {}).get("content") or "")
              if message_regex_list:
                  m = None
                  for message_regex in message_regex_list:
                      if not message_regex:
                          continue
                      m = re.search(message_regex, content, re.MULTILINE | re.DOTALL)
                      if m is not None:
                          break
                  if m is None:
                      part = content
                      regex_extraction = "no_match"
                  else:
                      part = (m.group(1) if m.groups() else m.group(0)).strip()
                      regex_extraction = "matched" if part else "matched_empty"
              else:
                  part = content
                  regex_extraction = "no_regex"

              from_obj = msg.get("from") or {}
              if provider == "OUTLOOK":
                  email_address_obj = from_obj.get("emailAddress") or {}
                  email_addr = (email_address_obj.get("address") or from_obj.get("address") or "").strip()
                  from_name = (email_address_obj.get("name") or from_obj.get("name") or "").strip()
                  received_dt = str(msg.get("receivedDateTime") or "").strip()
                  sent_dt = str(msg.get("sentDateTime") or "").strip()
                  from_addr_lc = email_addr.lower()
                  recipient_addrs = []
                  for r in (msg.get("toRecipients") or []):
                      ea = ((r or {}).get("emailAddress") or {})
                      a = (ea.get("address") or "").strip().lower()
                      if a:
                          recipient_addrs.append(a)
                  # Outlook message timestamps are not reliable for direction classification.
                  # Prefer explicit mailbox-address checks first.
                  if listener_email and from_addr_lc == listener_email:
                      is_outgoing = True
                  elif listener_email and listener_email in recipient_addrs:
                      is_outgoing = False
                  else:
                      is_outgoing = bool(received_dt and sent_dt and received_dt == sent_dt)
              else:
                  raw_from = ((from_obj.get("address") or "") if isinstance(from_obj, dict) else "").strip()
                  parsed_addresses = []
                  for _, addr in getaddresses([raw_from]):
                      a = (addr or "").strip().lower()
                      if a:
                          parsed_addresses.append(a)
                  # Prefer the first parsed sender that is not the listener mailbox.
                  # This avoids replying to the owner/listener address when headers contain multiple addresses.
                  email_addr = ""
                  for addr in parsed_addresses:
                      if not listener_email or addr != listener_email:
                          email_addr = addr
                          break
                  if not email_addr and parsed_addresses:
                      email_addr = parsed_addresses[0]
                  if not email_addr:
                      email_addr = raw_from
                  from_name = ((from_obj.get("name") or "") if isinstance(from_obj, dict) else "").strip()
                  received_dt = str(msg.get("receivedDateTime") or "").strip()
                  is_outgoing = bool(listener_email and listener_email in parsed_addresses)

              role = "assistant" if is_outgoing else "user"
              direction = "outgoing" if is_outgoing else "incoming"
              if not is_outgoing:
                  if provider == "OUTLOOK":
                      if received_dt and (not latest_inbound_key or received_dt > latest_inbound_key):
                          latest_inbound_key = received_dt
                          latest_inbound_message_id = (msg.get("id") or "").strip()
                          latest_inbound_from_address = email_addr
                          latest_inbound_from_name = from_name
                          latest_inbound_subject = (msg.get("subject") or "").strip()
                  else:
                      rc = int(received_dt) if received_dt.isdigit() else 0
                      if rc and rc > latest_inbound_key:
                          latest_inbound_key = rc
                          latest_inbound_message_id = (msg.get("id") or "").strip()
                          latest_inbound_from_address = email_addr
                          latest_inbound_from_name = from_name
                          latest_inbound_subject = (msg.get("subject") or "").strip()
              messages.append({"content": part, "index": idx, "from": email_addr or None, "fromName": from_name or None, "role": role, "direction": direction, "regex_extraction": regex_extraction})

          return {
              "messages": messages,
              "latestInboundMessageId": latest_inbound_message_id,
              "latestInboundFromAddress": latest_inbound_from_address,
              "latestInboundFromName": latest_inbound_from_name,
              "latestInboundSubject": latest_inbound_subject,
          }
    props:
      emailProvider: ${inputs.emailProvider}
      conversationMessages: ${target-conversations[each.index].messages}
      message_regex: ${inputs.message_regex}
      listenerEmail: ${inputs.listenerEmail}

  get-listing-data:
    description: |
      Listing URL aus dem Thread (Regex), Airtable-Lookup; bei Cache-Miss Seite laden,
      strukturierte Felder in Airtable anlegen und Records zurückgeben.
    foreach: ${target-thread-ids.ids}
    source:
      repoUrl: https://github.com/Edurata/edurata-workflows.git
      path: apps/copilot/functions/get-listing-data
    props:
      messages: ${extract-conversation-info[each.index].messages}
      anzeigeUrlRegex: ${inputs.anzeige_url_regex}
      airtable_base_id: ${inputs.airtable_base_id}
      airtable_table_id: ${inputs.airtable_table_id}
      airtable_filter_field: ${inputs.airtable_filter_field}
      token: ${secrets.copilot-airtable-api-key}

  prepare-combined-text-for-reply:
    description: |
      Baut den gelabelten Konversationstext wie getReplyToMessage; bei >5 Nachrichten oder >8000 Zeichen
      Zusammenfassung per forwardToChatGPT (POST generate-response mit systemMessage+message).
    foreach: ${target-thread-ids.ids}
    runtime: python3_10
    code: |
      import json
      import urllib.request
      import urllib.error

      THRESH_MSG = 5
      THRESH_LEN = 8000

      def handler(inputs):
          messages = inputs.get("messages") or []

          def label(m):
              direction = m.get("direction") or (
                  "incoming" if (m.get("role") or "user") == "user" else "outgoing"
              )
              return "Incoming: " if direction == "incoming" else "Outgoing: "

          parts = []
          for m in messages:
              t = label(m) + (m.get("content") or "").strip()
              if t.strip():
                  parts.append(t)
          combined = "\n\n".join(parts)
          if not combined.strip():
              return {"combinedText": "", "summarized": False, "error": "empty_conversation"}

          if len(messages) <= THRESH_MSG and len(combined) <= THRESH_LEN:
              return {"combinedText": combined, "summarized": False}

          api = (inputs.get("apiUrl") or "").rstrip("/")
          token = (inputs.get("executionToken") or "").strip()
          if not api or not token:
              return {"combinedText": combined, "summarized": False, "error": "missing_api_or_token"}

          body = json.dumps({
              "systemMessage": (
                  "Fasse die folgende E-Mail-Konversation in 2–4 Sätzen auf Deutsch zusammen. "
                  "Behalte die wichtigsten Fakten und den aktuellen Stand bei."
              ),
              "message": combined,
              "parseResponseToJson": False,
          }).encode()
          req = urllib.request.Request(
              api + "/copilot/generate-response",
              data=body,
              headers={"Authorization": "Bearer " + token, "Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=90) as resp:
                  out = json.loads(resp.read().decode())
          except urllib.error.HTTPError as e:
              detail = e.read().decode() if e.fp else str(e)
              return {"combinedText": combined, "summarized": False, "error": "summarize_http_" + str(getattr(e, "code", "")) + ":" + detail[:500]}
          except Exception as e:
              return {"combinedText": combined, "summarized": False, "error": str(e)[:500]}

          summary = (out.get("reply") or "").strip()
          return {"combinedText": summary or combined, "summarized": True}
    props:
      messages: ${extract-conversation-info[each.index].messages}
      apiUrl: ${meta.apiUrl}
      executionToken: ${meta.executionToken}

  generate-ai-responses:
    description: |
      message-reply-generator: Klassifikation needsSchedulingContext, dann ein Single-Shot-Reply (Kategorien + optional scheduling).
      Nutzt build-calendar-availability-from-outlook.calendarAvailability; Termin-Block-Schritte im calendar-steps-Partial.
      Die langen Instruktions-Prompts (classifySystem, replyBase, schedulingInstructions) werden hier
      inline gepflegt, damit ein Prompt-Tweak nur einen Workflow-Re-Deploy braucht und keinen
      Funktions-Rebuild. Strukturelle Kurzregeln (Kategorie-Präfix, JSON-Shape-Regeln, Trailer)
      bleiben fest im Funktionscode, weil sie an den JSON-Parser gekoppelt sind.
      Wichtig: keine `${...}`-Platzhalter im Prompt-Text — die Workflow-Engine würde sie als
      Dependency-Referenzen interpretieren; nutze `{user.email}` o. ä.
    foreach: ${target-thread-ids.ids}
    source:
      repoUrl: https://github.com/Edurata/edurata-workflows.git
      path: apps/copilot/functions/message-reply-generator
    props:
      apiUrl: ${meta.apiUrl}
      executionToken: ${meta.executionToken}
      combinedText: ${prepare-combined-text-for-reply[each.index].combinedText}
      customInfo: ${inputs.customInfo}
      customCategories: ${inputs.customCategories}
      primaryKey: ${get-listing-data[each.index].listingUrl}
      airtableData: ${get-listing-data[each.index].response.data}
      scheduleAppointments: ${inputs.scheduleAppointments}
      calendarAvailability: ${build-calendar-availability-from-outlook.calendarAvailability}
      classifySystem: |-
        Du klassifizierst E-Mail-Konversationen. Entscheide, ob es um Termine, Uhrzeiten, Treffen, Besichtigungen, Rückrufzeiten, Verfügbarkeit oder Kalender geht (auch indirekt, z. B. „nächste Woche“, „wann passt es“).
        Antworte ausschließlich mit einem JSON-Objekt mit genau einem booleschen Schlüssel: "needsSchedulingContext" (true oder false).
        Kein Markdown, keine Code-Blöcke, kein weiterer Text.
      replyBase: |-
        Dir wird ein Email verlauf als Kontext von dir mit einer anderen Person gegeben. Du agierst im Namen eines Unternehmens und antwortest auf die letzte(n) unbeantwortete(n) Nachricht(en) der anderen Person.
        Die andere Person ist ein Kundin/Kunde oder Interessent des Unternehmens.
        1. Formuliere eine passende, freundliche Chat-Antwort (reply). Nutze dazu ausschließlich die dir gegebenen Informationen zur Beantwortung.
        1.1. Fasse dich so kurz wie möglich und ähnlich in der Länge wie die letzte Nachricht der anderen Person.
        1.2. Passe deinen Schreibstil an den der anderen Person an aber bleibe stehts professionell und freundlich.
        1.3. Antworte nur auf Produkt und Serviceangelegenheiten des Unternehmens, nicht auf allgemeine Themen.
        1.4. Sprich die andere Person nicht mit dem Nutzernamen an, sondern nur am Anfang mit seinem Namen und dann mit der Bezeichnung 'Sie'.
        1.5. Faktentreue (SEHR WICHTIG, keine Halluzinationen): Nenne nur Fakten, die wörtlich in einer der folgenden Quellen stehen: (a) im Konversationsverlauf weiter oben, (b) im Abschnitt "Informationen zur Beantwortung", oder (c) im Abschnitt "Airtable-Daten". Wenn eine Information in keiner dieser Quellen steht, gib sie NICHT an — auch nicht als Beispiel, Annahme oder „typischerweise".
        1.6. Erfinde insbesondere NIE: Orte, Adressen, Abhol-/Übergabeorte, Städte, Stadtteile, Wochentage, Daten, Uhrzeiten, Preise, Rabatte, Modell-/Baujahres-/Kilometer-/Ausstattungsdetails, Telefonnummern, E-Mail-Adressen, Namen oder Ansprechpartner. Wenn so etwas in der Konversation gefragt wird und dir die Information nicht aus einer der Quellen vorliegt, antworte explizit, dass du das kurz intern prüfst und dich zurückmeldest (oder frage höflich nach), aber rate niemals.
        1.7. Schlage von dir aus KEINE konkreten Uhrzeiten, Wochentage oder Datumsangaben vor. Konkrete Termine kommen ausschließlich aus dem separaten Terminfindungs-Abschnitt (siehe Punkt 3) und nur, wenn dort eine Slot-Liste angegeben ist. Ohne Slot-Liste gibt es keine konkreten Zeitangaben in der Antwort.
        1.8. Vor dem Senden prüfe deine Antwort: Steht jedes konkrete Detail (Ort, Zeit, Preis, Produktangabe, Name, Kontakt) wörtlich in einer der drei Quellen oder in der Slot-Liste? Falls nein, entferne oder ersetze es durch eine neutrale Formulierung (z. B. „Ich klär das kurz intern und melde mich gleich nochmal.").
      schedulingInstructions: |-
        3. Terminfindung (nur wenn im User-Message-Block freie Slots aufgeführt sind): Du kennst kein konkretes Kalenderprodukt (weder Outlook noch Google). Nutze ausschließlich die angegebenen freien Zeitfenster für konkrete Uhrzeiten.
        - Strenge Slot-Bindung (keine Halluzinationen): Du darfst ausschließlich Zeitfenster vorschlagen oder bestätigen, die WÖRTLICH in der Slot-Liste oben stehen. Übernimm Start- und Endzeit sowie Wochentag/Datum exakt wie dort aufgeführt — runde nicht, kürze nicht, verschiebe nichts. Erfinde NIE eine Uhrzeit, einen Wochentag oder ein Datum, das dort nicht aufgeführt ist — auch nicht mit Formulierungen wie „z. B. Freitag um 15 Uhr", „ungefähr", „typischerweise" oder „etwa".
        - Wenn die Slot-Liste leer ist oder keinen passenden Termin enthält: Schlage KEINEN Termin und KEINE Uhrzeit vor. Schreibe stattdessen, dass du passende freie Zeiten kurz prüfst und dich gleich nochmal mit konkreten Vorschlägen meldest. Setze "scheduling": null.
        - Formuliere im Feld "reply" **eine** zusammenhängende Nachricht: zuerst die inhaltliche Antwort auf die Konversation, dann ggf. einen kurzen Abschnitt zur Terminvereinbarung (1–3 Optionen aus der Liste oder Bestätigung/Alternativen aus der Liste — niemals außerhalb der Liste).
        - Wenn du konkrete Slots aus der Liste vorschlägst oder einen Slot bestätigen willst, setze zusätzlich "scheduling" als Objekt mit wantsScheduling, requestedDayOrPreference, selectedSlotStart, selectedSlotEnd (Start/End exakt wie in der Slot-Liste, damit das System den Slot blockieren kann). Sonst "scheduling": null.
        - Wenn die andere Person einen Wunschtermin nennt: vergleiche mit der Liste. Wenn der Wunsch wörtlich in der Liste steht, bestätige diesen Slot und setze scheduling entsprechend. Wenn er NICHT in der Liste steht, teile höflich mit, dass dieser Termin nicht verfügbar ist, und biete ausschließlich Slots aus der Liste als Alternative an; scheduling bleibt dann null, solange die andere Person keinen Listen-Slot bestätigt.
