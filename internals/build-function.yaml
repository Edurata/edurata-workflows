apiRevision: edurata.io/v1
name: build-function-code
title: Build function code
description: Fetches the git repo and builds the function code and then uploads it to the function registry.
interface:
  inputs:
    properties:
      functionsToBuild:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            source:
              type: object
              properties:
                repoUrl:
                  type: string
                path:
                  type: string
                ref:
                  type: string
            runtime:
              type: string
    required:
      - functionsToBuild
steps:
  git-clone:
    foreach: ${inputs.functionsToBuild}
    description: Cloning a repo
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: etl/extract/clone-git
    dependencies:
      repoUrl: ${each.source.repoUrl}
      path: ${each.source.path}
      ref: ${each.source.ref}
      privateUser: gitlab-ci-token
      privateToken: ${secrets.GITLAB_TOKEN}
  get-runtime:
    foreach: ${git-clone}
    runtime: python3_10
    code: |
      import os
      def handler(event):
        runtimes = []
        for filepath in event["files"]:
          # try to open definition at this path
          definition_path = os.path.join(filepath, ".edufc.yml")
          with open(definition_path, "r") as file:
            definition = json.load(file)
            if definition.get("runtime"):
              runtimes.append({"runtime": definition["runtime"]})
        return {runtimes: runtimes}
    interface:
      inputs:
        type: object
        properties:
          files:
            type: array
            items:
              type: file
      outputs:
        type: object
        properties:
          runtimes:
            type: array
            items:
              type: file
    dependencies:
      files: ${each.repoCode}
  build-nodejs20:
    foreach: ${inputs.functionsToBuild}
    if: ${get-runtime[each.index].runtime} === "nodejs20"
    description: Building the python10 code
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: internals/build-nodejs20
    dependencies:
      source: ${each.source}
  build-python3_10:
    foreach: ${inputs.functionsToBuild}
    if: ${get-runtime[each.index].runtime} === "python3_10"
    description: Building the python10 code
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: internals/build-python3_10
    dependencies:
      source: ${each.source}
  merge-results:
    description: Merging the information again so that we can upload the code in an array. Interface only necessary bc of files integration.
    runtime: nodejs20
    dependencies:
      results:
        - ${build-nodejs20.result}
        - ${build-python3_10.result}
    interface:
      inputs:
        type: array
        items:
          type: array
          items:
            type: object
            properties:
              code:
                type: file
      outputs:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            code:
              type: file
    code: |
      const handler = async (event) => {
        const { results } = event;

        return {results: results.flat()}
      }
      module.exports = {handler}
  get-upload-url:
    foreach: ${merge-results.results}
    if: ${get-runtime[each.index].runtime} !== "docker"
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: general/axios
    dependencies:
      url: "https://api.edurata.io/v1/functions/${each.name}/upload-url"
      headers:
        Authorization: "Bearer ${meta.executionToken}"
  zip-code:
    foreach: ${merge-results.results}
    if: ${get-runtime[each.index].runtime} !== "docker"
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: etl/transform/zip
    dependencies:
      file: ${each.code}
  upload-code:
    foreach: ${merge-results.results}
    if: ${get-runtime[each.index].runtime} !== "docker"
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: general/axios
    dependencies:
      url: "${get-upload-url[each.index].response.url}"
      file: ${zip-code[each.index].zipped}
