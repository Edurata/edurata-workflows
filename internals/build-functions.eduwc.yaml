apiRevision: edurata.io/workflow/v1
name: build-function-code
title: Build function code
description: The workflow begins by cloning a Git repository for each function to be built. It then identifies the runtime for the functions using the cloned code. Depending on the runtime, it builds either Node.js 20 or Python 3.10 code. The results of both builds are merged. Finally, for each non-docker runtime, an upload URL is obtained and the zipped code is uploaded to it.
interface:
  inputs:
    properties:
      functionsToBuild:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            source:
              type: object
              properties:
                repoUrl:
                  type: string
                path:
                  type: string
                ref:
                  type: string
    required:
      - functionsToBuild
steps:
  git-clone:
    foreach: ${inputs.functionsToBuild}
    packages:
      isomorphic-git: 1.25.6
    runtime: nodejs20
    description: Clones a Git repository from a provided URL to a temporary path for each function to be built..
    interface:
      inputs:
        properties:
          repoUrl:
            type: string
            description: The URL of the Git repository to clone.
          auth:
            type: object
            properties:
              privateUser:
                type: string
                description: A username for accessing private repositories. Optional.
              privateToken:
                type: string
                description: A token for accessing private repositories. Optional.
          path:
            type: string
            description: A sub-path within the repository to return.
          ref:
            type: string
            description: A reference within the repository to checkout (branch, tag, or commit). Optional.
        required:
          - repoUrl
      outputs:
        properties:
          status:
            type: string
            description: Success or failure message.
          repoCode:
            type: file
            description: The path to the cloned sub-path in the local file system.

    code: |
      const path = require("path");
      const fs = require("fs");
      const { clone, checkout, init, fetch } = require("isomorphic-git");
      const http = require("isomorphic-git/http/node");

      async function handler(inputs) {
        // Test
        const tempDir = process.env.TMP_DIR || "/tmp";
        const repoPath = path.join(tempDir, `repo-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`);
        const url = inputs.source.repoUrl;
        const ref = inputs.source.ref || "HEAD";

        await init({ fs, dir: repoPath });
        await clone({
          fs,
          dir: repoPath,
          url,
          singleBranch: true,
          http,
          depth: 1,
          onAuth: () => {
            if (inputs.auth && inputs.auth.privateToken) {
              return { username: inputs.auth.privateToken };
            }
          },
        });
        await fetch({
          fs,
          dir: repoPath,
          url,
          ref,
          http,
          depth: 1,
          singleBranch: true,
          onAuth: () => {
            if (inputs.auth && inputs.auth.privateToken) {
              return { username: inputs.auth.privateToken };
            }
          },
        });
        if (ref && ref !== "HEAD") {
          await checkout({ fs, dir: repoPath, ref });
        }

        const finalPath = inputs.source.path ? path.join(repoPath, inputs.source.path) : repoPath;
        return { status: "Repository cloned successfully.", repoCode: finalPath };
      }

      module.exports = { handler };
    props:
      source: ${each.source}
      auth: ${each.auth}
  get-runtime:
    runtime: python3_10
    description: This step retrieves the runtime for the functions to be built, using the repository code from the previous git-clone step and the functions specified in the input.
    code: |
      import os

      def load_definition(filepath):
          runtime = ""
          for filename in (".edufc.yaml", ".edufc.yml"):
              definition_path = os.path.join(filepath, filename)
              if os.path.exists(definition_path):
                  with open(definition_path, "r") as file:
                      for line in file:
                          line = line.strip()
                          if line.startswith("runtime:"):
                              runtime = line.split(":", 1)[1].strip("`'\" ").strip()
                              break
                  break
          return runtime

      def handler(event):
          runtime_and_files = []
          for index, filepath in enumerate(event["files"]):
              rest = event["rest"][index]
              print(os.listdir(filepath))
              runtime = load_definition(filepath)
              runtime_and_files.append({"runtime": runtime, "repoCode": filepath, **rest})
          sorted_runtime_and_files = sorted(runtime_and_files, key=lambda x: (x["runtime"] != "python", x["runtime"]))
          return {"runtime_and_files": sorted_runtime_and_files}
    interface:
      inputs:
        type: object
        properties:
          files:
            type: array
            items:
              type: file
      outputs:
        type: object
        properties:
          runtime_and_files:
            type: array
            items:
              type: object
              properties:
                runtime:
                  type: string
                repoCode:
                  type: file
    props:
      files: ${git-clone[*].repoCode}
      rest: ${inputs.functionsToBuild}
  build-nodejs20:
    foreach: ${get-runtime.runtime_and_files}
    if:
      ===:
        - ${each.runtime}
        - nodejs20
    runtime: nodejs20
    description: Builds Node.js 20 by running npm install in the repository code directory.
    interface:
      inputs:
        properties:
          code:
            type: file
            description: Path to the repository code directory.
      outputs:
        properties:
          code:
            type: file
            description: Path to the built code directory.
    code: |
      // Test
      const fs = require("fs");
      const { execSync } = require("child_process");

      async function handler(inputs) {
        const codePath = inputs.code;

        try {
          console.log("npm installing in ", codePath);
          const tmpNpmDir = "/tmp/npm-tmp";
          fs.mkdirSync(tmpNpmDir, { recursive: true });
          execSync(
            "npm install --only=production --ignore-scripts --no-audit --no-fund --cache /tmp/npm-cache",
            {
              cwd: codePath,
              stdio: "inherit",
              env: {
                ...process.env,
                npm_config_cache: "/tmp/npm-cache",
                npm_config_tmp: "/tmp/npm-tmp",
                npm_config_prefix: "/tmp/npm-prefix",
                HOME: "/tmp",
              },
            }
          );

          if (fs.existsSync(`${codePath}/package-lock.json`))
            fs.unlinkSync(`${codePath}/package-lock.json`);
          if (fs.existsSync(`${codePath}/package.json`))
            fs.unlinkSync(`${codePath}/package.json`);
          console.log("NPM modules installed successfully.");
        } catch (error) {
          console.error("Error installing NPM modules:", error);
          return { code: codePath };
        }

        return { code: codePath };
      }

      module.exports = { handler };
    props:
      code: ${each.repoCode}
  build-python3_10:
    foreach: ${get-runtime.runtime_and_files}
    if:
      ===:
        - ${each.runtime}
        - python3_10
    runtime: python3_10
    description: Builds Python 3.10 code by modifying handler signatures and running pip install.
    interface:
      inputs:
        properties:
          code:
            type: file
            description: Path to the repository code directory.
      outputs:
        properties:
          code:
            type: file
            description: Path to the built code directory.
    code: |
      # Test
      import subprocess
      import os
      import re

      def modify_handler_signature(code):
          pattern = r"def handler\(([^,)]+)\):"
          replacement = r"def handler(\1, additional_parameter = 'Dummy'):"
          return re.sub(pattern, replacement, code)

      def modify_handlers_recursively(directory):
          for root, _, files in os.walk(directory):
              for file_name in files:
                  if file_name.endswith('.py'):
                      file_path = os.path.join(root, file_name)
                      with open(file_path, 'r+') as file:
                          content = file.read()
                          modified_content = modify_handler_signature(content)
                          file.seek(0)
                          file.write(modified_content)
                          file.truncate()

      def handler(inputs):
          codePath = inputs['code']
          python_modules_path = codePath

          modify_handlers_recursively(codePath)

          try:
              subprocess.check_call([os.sys.executable, '-m', 'pip', 'install', '-r', os.path.join(codePath, 'requirements.txt'), '-t', python_modules_path])
              print('Python packages installed successfully in', python_modules_path)
              files_and_folders = os.listdir(codePath)
              print('Files and folders in', codePath, ':', files_and_folders)
          except subprocess.CalledProcessError as error:
              print('Error installing Python packages:', error)
              return {'code': codePath}

          return {'code': codePath}
    props:
      code: ${each.repoCode}
  merge-and-zip:
    description: Merges build results from Node.js 20 and Python 3.10, then zips each code path for upload.
    runtime: nodejs20
    packages:
      archiver: ^5.3.0
    props:
      results:
        - ${build-nodejs20?}
        - ${build-python3_10?}
    interface:
      inputs:
        type: object
        properties:
          results:
            type: array
            items:
              type: array
              items:
                type: object
                properties:
                  code:
                    type: file
      outputs:
        type: object
        properties:
          results:
            type: array
            items:
              type: object
              properties:
                code:
                  type: file
                zipped:
                  type: file
    code: |
      const fs = require("fs");
      const path = require("path");
      const { execSync } = require("child_process");

      function zipPath(filePath) {
        const outputPath = path.join("/tmp", `zip-${Date.now()}-${Math.random().toString(36).slice(2, 8)}.zip`);
        const stat = fs.statSync(filePath);
        if (stat.isDirectory()) {
          execSync(`zip -r "${outputPath}" .`, { cwd: filePath });
        } else {
          const dir = path.dirname(filePath);
          const base = path.basename(filePath);
          execSync(`zip "${outputPath}" "${base}"`, { cwd: dir });
        }
        return outputPath;
      }

      const handler = async (event) => {
        console.log(JSON.stringify(event));
        const { results } = event;
        const merged = results.flat().filter(result => result && result.code && !result.__pass__);
        const resultsWithZip = merged.map((result) => ({
          code: result.code,
          zipped: zipPath(result.code),
        }));
        return { results: resultsWithZip };
      };
      module.exports = { handler };
  get-upload-url:
    foreach: ${get-runtime.runtime_and_files}
    if:
      "!==":
        - ${each.runtime}
        - docker
    runtime: nodejs20
    description: Obtains an upload URL for each non-docker runtime via a single GET request.
    code: |
      const https = require("https");
      const http = require("http");

      function request(url, options) {
        const u = new URL(url);
        const lib = u.protocol === "https:" ? https : http;
        return new Promise((resolve, reject) => {
          const req = lib.request(url, { method: options.method || "GET", headers: options.headers }, (res) => {
            let data = "";
            res.on("data", (ch) => { data += ch; });
            res.on("end", () => {
              try {
                resolve({ status: res.statusCode, statusText: res.statusMessage, headers: res.headers, data: data ? JSON.parse(data) : null });
              } catch (e) {
                resolve({ status: res.statusCode, statusText: res.statusMessage, headers: res.headers, data });
              }
            });
          });
          req.on("error", reject);
          req.end();
        });
      }

      async function handler(inputs) {
        const { url, headers = {} } = inputs;
        const response = await request(url, { method: "GET", headers });
        return { response: { status: response.status, statusText: response.statusText, headers: response.headers, data: response.data } };
      }

      module.exports = { handler };
    props:
      url: ${meta.apiUrl}/function/${each.name}/upload-url
      headers:
        Authorization: Bearer ${meta.executionToken}
  upload-code:
    foreach: ${merge-and-zip.results}
    if:
      "!==":
        - ${get-runtime.runtime_and_files[each.index].runtime}
        - docker
    runtime: nodejs20
    description: Uploads zipped code to the presigned upload URL via a single PUT request.
    interface:
      inputs:
        properties:
          url:
            type: string
            description: Presigned URL to upload the zip to.
          dataFromFile:
            type: file
            description: Path to the zipped code file to upload.
    code: |
      // Test
      const https = require("https");
      const http = require("http");
      const fs = require("fs");

      function putWithFile(url, filePath, headers = {}) {
        const u = new URL(url);
        const lib = u.protocol === "https:" ? https : http;
        const stat = fs.statSync(filePath);
        const fileStream = fs.createReadStream(filePath);
        const h = { ...headers, "Content-Length": stat.size };

        return new Promise((resolve, reject) => {
          const req = lib.request(url, { method: "PUT", headers: h }, (res) => {
            let data = "";
            res.on("data", (ch) => { data += ch; });
            res.on("end", () => {
              try {
                resolve({ status: res.statusCode, statusText: res.statusMessage, headers: res.headers, data: data ? JSON.parse(data) : null });
              } catch (e) {
                resolve({ status: res.statusCode, statusText: res.statusMessage, headers: res.headers, data });
              }
            });
          });
          req.on("error", reject);
          fileStream.pipe(req);
        });
      }

      async function handler(inputs) {
        const { url, dataFromFile } = inputs;
        const response = await putWithFile(url, dataFromFile);
        return { response: { status: response.status, statusText: response.statusText, headers: response.headers, data: response.data } };
      }

      module.exports = { handler };
    props:
      url: ${get-upload-url[each.index].response.data.uploadUrl}
      dataFromFile: ${each.zipped}
