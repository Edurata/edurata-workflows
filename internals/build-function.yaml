apiRevision: edurata.io/v1
name: build-function-code
title: Build function code
description: Fetches the git repo and builds the function code and then uploads it to the function registry.
interface:
  inputs:
    properties:
      newVersion:
        type: string
        description: The new version of the function code.
      source:
        type: object
        description: The source object which contains the repoUrl and the path to the function code.
        properties:
          repoUrl:
            type: string
            description: The url of the git repo.
          path:
            type: string
            description: The path to the function code.
          ref:
            type: string
            description: The git ref to checkout.
    required:
      - source
steps:
  git-clone:
    description: Cloning a repo
    cache: true
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: etl/extract/clone-git
    dependencies:
      repoUrl: ${inputs.source.repoUrl}
      path: ${inputs.source.path}
      ref: ${inputs.source.ref}
      privateUser: ${secrets.GITLAB_USER}
      privateToken: ${secrets.GITLAB_TOKEN}
  get-runtime:
    description: Getting the runtime of the function
    cache: true
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: general/eval-nodejs
    dependencies:
      code: |
        import fs from "fs";
        const { repoPath } = inputs;
        // get .edufc.yml file
        if (fs.)
      inputs:
        repoPath: ${git-clone.repoCode}
  build-function:
    if: ${get-runtime.outputs.runtime == "nodejs20"}
    description: Building the python10 code
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: internals/build-function/python3_10.yaml
