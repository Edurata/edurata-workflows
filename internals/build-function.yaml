apiRevision: edurata.io/v1
name: build-function-code
title: Build function code
description: Fetches the git repo and builds the function code and then uploads it to the function registry.
interface:
  inputs:
    properties:
      functionsToBuild:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            source:
              type: object
              properties:
                repoUrl:
                  type: string
                path:
                  type: string
                ref:
                  type: string
            runtime:
              type: string
    required:
      - functionsToBuild
steps:
  git-clone:
    foreach: ${inputs.functionsToBuild}
    if: ${each.code} === undefined
    description: Cloning a repo
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: etl/extract/clone-git
    dependencies:
      repoUrl: ${each.source.repoUrl}
      path: ${each.source.path}
      ref: ${each.source.ref}
      privateUser: ${secrets.GITLAB_USER}
      privateToken: ${secrets.GITLAB_TOKEN}
  build-nodejs20:
    foreach: ${inputs.functionsToBuild}
    if: ${each.runtime} === "nodejs20" && ${each.code} === undefined
    description: Building the python10 code
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: internals/build-nodejs20
    dependencies:
      source: ${each.source}
  build-python3_10:
    foreach: ${inputs.functionsToBuild}
    if: ${each.runtime} === "python3_10" && ${each.code} === undefined
    description: Building the python10 code
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: internals/build-python3_10
    dependencies:
      source: ${each.source}
  merge-results:
    description: Merging the information again so that we can upload the code in an array. Interface only necessary bc of files integration.
    dependencies:
      results:
        - ${build-nodejs20.result}
        - ${build-python3_10.result}
    interface:
      inputs:
        type: array
        items:
          type: array
          items:
            type: object
            properties:
              code:
                type: file
      outputs:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            code:
              type: file
    code: |
      const { results } = event;

      return {results: results.flat()}
  get-upload-url:
    foreach: ${merge-results.results}
    if: ${each.runtime} !== "docker"
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: general/axios
    dependencies:
      url: "https://api.edurata.io/v1/functions/${each.name}/upload-url"
      headers:
        Authorization: "Bearer ${secrets.EXECUTION_TOKEN}"
  zip-code:
    foreach: ${merge-results.results}
    if: ${each.runtime} !== "docker"
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: etl/transform/zip
    dependencies:
      file: ${each.code}
  upload-code:
    foreach: ${merge-results.results}
    if: ${each.runtime} !== "docker"
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: general/axios
    dependencies:
      url: "${get-upload-url[each.index].response.url}"
      file: ${zip-code[each.index].zipped}
