apiRevision: edurata.io/v1
name: build-function-code
title: Build function code
description: Fetches the git repo and builds the function code and then uploads it to the function registry.
interface:
  inputs:
    properties:
      functionsToBuild:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            source:
              type: object
              properties:
                repoUrl:
                  type: string
                path:
                  type: string
                ref:
                  type: string
            runtime:
              type: string
    required:
      - functionsToBuild
steps:
  git-clone:
    foreach: ${inputs.functionsToBuild}
    description: Cloning a repo
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: etl/extract/clone-git
    dependencies:
      repoUrl: ${each.source.repoUrl}
      path: ${each.source.path}
      ref: ${each.source.ref}
      privateUser: ${secrets.GITLAB_USER}
      privateToken: ${secrets.GITLAB_TOKEN}
  build-nodejs20:
    foreach: ${inputs.functionsToBuild}
    if: ${each.runtime} === "nodejs20"
    description: Building the python10 code
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: internals/build-function/nodejs20
    dependencies:
      source: ${each.source}
  build-python3_10:
    foreach: ${inputs.functionsToBuild}
    if: ${each.runtime} === "python3_10"
    description: Building the python10 code
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: internals/build-function/python3_10
    dependencies:
      source: ${each.source}
  upload-function:
    description: Uploading the function code to the function registry
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: general/eval-nodejs
    dependencies:
      code: |
        const { newVersion } = inputs;
        // upload the function code to the function registry
        return newVersion;
      inputs:
        newVersion: ${inputs.newVersion}
