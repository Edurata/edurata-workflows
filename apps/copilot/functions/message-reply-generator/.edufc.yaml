# Edurata function: LLM HTTP traffic + prompt construction for message replies (per thread).
apiRevision: edurata.io/function/v1
name: message-reply-generator
title: Message Reply Generator (classify + generate)
description: |
  Internal HTTP (same route as workflow inline steps used before):
  1) POST {apiUrl}/copilot/generate-response — classify needsSchedulingContext (parseResponseToJson).
  2) Build systemMessage + userMessage (categories, optional free-slot list, single-shot JSON rules).
  3) POST {apiUrl}/copilot/generate-response — final reply (parseResponseToJson).

  Output shape matches prior generate-ai-responses step: { response: { data: { reply, parsedJson, ... } } }.
runtime: python3_10
interface:
  inputs:
    type: object
    properties:
      apiUrl:
        type: string
        description: Base API URL (e.g. meta.apiUrl), no trailing slash required.
      executionToken:
        type: string
        description: Bearer token for private API (meta.executionToken).
      combinedText:
        type: string
        description: Labeled conversation text for this thread.
      customInfo:
        type: string
        description: Extra context for the model.
      customCategories:
        type: any
        description: Listener category definitions (array/object).
      lang:
        type: string
        description: Language for DISCRETE_THREE/SENTIMENT default category values (de or en).
      primaryKey:
        type: string
        description: Listing URL (cache key) from get-listing-data; shown in the Airtable context block.
      airtableData:
        type: any
      scheduleAppointments:
        type: boolean
      calendarAvailability:
        type: any
        description: calendarAvailability from outlook-calendar-free-slots (or null).
      classifySystem:
        type: string
        description: |
          Optional override for the system message used by the needsSchedulingContext classifier
          (first LLM call). Falls back to the in-code default when omitted/empty.
          Avoid `${...}` patterns — the workflow engine treats them as dependency references.
      replyBase:
        type: string
        description: |
          Optional override for the base reply guidelines block prepended to the reply system
          message (second LLM call). Multi-line YAML scalar. Falls back to the in-code default.
          Avoid `${...}` patterns — use `{user.email}` style placeholders if needed.
      schedulingInstructions:
        type: string
        description: |
          Optional override for the section 3 scheduling instructions, only included when free
          slots are present. Falls back to the in-code default when omitted/empty.
          Avoid `${...}` patterns.
    required:
      - apiUrl
      - executionToken
  outputs:
    type: object
    properties:
      response:
        type: object
        description: Wrapper with data shaped like general/axios response.data for drafts/calendar extract.
    required:
      - response
