apiRevision: edurata.io/v1
name: ai-translator
title: Ai Translator
schedule: "0 8 * * *"
description: Fetching the latest posts from an instagram site and translates them to a target language and then pushes it to an X account.
interface:
  inputs:
    properties:
      sourceLanguage:
        type: string
        description: The language of the posts.
      targetLanguage:
        type: string
        description: The language to translate the posts to.
      sourceInstagramId:
        type: string
        description: The instagram id of the source account.
    required:
      - targetLanguage
      - sourceInstagramId
steps:
  extract-text-from-instagram:
    description: Fetching the latest posts from an instagram site and tries to extract the content text
    source:
      imageRepoUrl: "edurata/ai-translator"
      tag: "1.0.0"
    cache: true
    dependencies:
      SOURCE_PROFILE:
        useAs: ENV
        value: ${inputs.sourceInstagramId}
      SOURCE_LANG:
        useAs: ENV
        value: ${inputs.sourceLanguage}
  translating-text:
    description: Translating the text from the source language to the target language
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: ai/translate-deepl
    dependencies:
      sourceTexts: ${extract-text-from-instagram.posts[*].text}
      targetLanguage: ${inputs.targetLanguage}
      DEEPL_API_KEY:
        value: ${secrets.DEEPL_API_KEY}
        useAs: ENV
  push-to-x:
    description: Pushing the translated texts to an X account
    cache: true
    source:
      repoUrl: "https://github.com/Edurata/edurata-functions.git"
      path: api/tweet
    dependencies:
      API_KEY: ${secrets.TWITTER_API_KEY}
      API_SECRET: ${secrets.TWITTER_API_SECRET}
      ACCESS_TOKEN: ${secrets.TWITTER_ACCESS_TOKEN}
      ACCESS_TOKEN_SECRET: ${secrets.TWITTER_ACCESS_TOKEN_SECRET}
      messages: ${translating-text.translated}
      mediaPaths: ${extract-text-from-instagram.posts[*].mediaPath}
